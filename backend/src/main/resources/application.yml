server:
  port: 9092

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/workafella_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  jwt-secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
  jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
  admin-email: ${ADMIN_EMAIL:admin@workafella.com}
  admin-password: ${ADMIN_PASSWORD:Admin@12345}
  frontend-url: ${FRONTEND_URL:http://localhost:5174}
